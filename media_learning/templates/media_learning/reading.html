{% extends "base.html" %}
{% block content %}
<div class="max-w-3xl mx-auto">
    <h1 class="text-3xl font-bold mb-6">Level-Based Reading</h1>

    <form method="get" class="mb-8 flex gap-2">
        <input type="text" name="topic" value="{{ topic }}" placeholder="Search a topic..." class="flex-1 p-2 border rounded">
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded">Search</button>
    </form>

    {% if article %}
        <div class="bg-white p-8 rounded-xl shadow-md">
            {% if article.thumbnail %}
                <img src="{{ article.thumbnail }}" class="mb-6 rounded-lg float-right w-48 ml-6">
            {% endif %}
            <h2 class="text-2xl font-bold mb-4">{{ article.title }}</h2>
            <div class="prose max-w-none text-gray-700 leading-relaxed text-lg">
                {{ article.content }}
            </div>
            <div class="mt-8 pt-6 border-t flex justify-between items-center">
                <a href="{{ article.url }}" target="_blank" class="text-blue-600 font-bold hover:underline">Read full article on {{ article.source }} &rarr;</a>
                <button class="bg-indigo-100 text-indigo-700 px-4 py-2 rounded font-bold hover:bg-indigo-200">Save for Later</button>
            </div>
        </div>
    {% else %}
        <p class="text-gray-500 italic">No reading material found for this topic.</p>
    {% endif %}
</div>
{% endblock %}
