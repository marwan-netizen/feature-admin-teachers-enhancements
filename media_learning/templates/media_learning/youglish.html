{% extends "base.html" %}
{% block content %}
<div class="max-w-4xl mx-auto text-center">
    <h1 class="text-3xl font-bold mb-6">Real-world Pronunciation (YouGlish)</h1>

    <form action="." method="get" class="mb-8 flex gap-2 justify-center">
        <input type="text" name="word" value="{{ word }}" class="p-2 border rounded w-64 shadow-sm">
        <button type="submit" class="bg-blue-600 text-white px-4 py-2 rounded font-bold hover:bg-blue-700">Go</button>
    </form>

    <div class="bg-white p-8 rounded-xl shadow-lg border">
        <a id="yg-widget-0" class="youglish-widget" data-query="{{ word }}" data-lang="english" data-components="8412" data-toggle-cue="1" data-captions="1" data-related="1" href="https://youglish.com">Visit YouGlish.com</a>
        <script async src="https://youglish.com/public/widget/widget.js" charset="utf-8"></script>
    </div>

    <p class="mt-6 text-gray-500 text-sm">Watch authentic videos to hear how "{{ word }}" is pronounced by native speakers.</p>
</div>
{% endblock %}
