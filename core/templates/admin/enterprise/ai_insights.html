{% extends 'unfold/layouts/base.html' %}

{% block content %}
<div class="px-4 py-8">
    <h1 class="text-2xl font-bold mb-6">AI Operational Intelligence</h1>

    <div class="space-y-6">
        {% for insight in insights %}
        <div class="bg-white dark:bg-gray-800 p-6 rounded-lg shadow border-l-4 {% if insight.confidence > 0.9 %}border-green-500{% else %}border-yellow-500{% endif %}">
            <div class="flex justify-between items-start">
                <div>
                    <h3 class="text-lg font-bold mb-2">{{ insight.insight }}</h3>
                    <p class="text-gray-600 dark:text-gray-400 mb-4">{{ insight.action }}</p>
                </div>
                <div class="text-right">
                    <span class="text-sm font-medium text-gray-500 uppercase">Confidence</span>
                    <p class="text-xl font-bold">{{ insight.confidence|floatformat:2 }}</p>
                </div>
            </div>
            <div class="mt-4">
                <button class="bg-primary-600 text-white px-4 py-2 rounded text-sm font-medium hover:bg-primary-700 transition">
                    Execute Recommended Action
                </button>
            </div>
        </div>
        {% endfor %}
    </div>
</div>
{% endblock %}
