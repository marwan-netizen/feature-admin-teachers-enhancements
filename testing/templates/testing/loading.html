{% extends "core/base.html" %}

{% block content %}
<div class="flex flex-col items-center justify-center min-h-[60vh]"
     hx-get="{% url 'testing:check_status' %}"
     hx-trigger="every 2s"
     hx-on::after-request="if(event.detail.xhr.status==200) {
        let res = JSON.parse(event.detail.xhr.responseText);
        if(res.status === 'ready') {
            window.location.href = res.redirect_url;
        }
     }">
    <div class="animate-spin rounded-full h-16 w-16 border-t-2 border-b-2 border-indigo-500 mb-4"></div>
    <h2 class="text-2xl font-semibold text-gray-800">Generating Your AI Powered Test...</h2>
    <p class="text-gray-600 mt-2">This usually takes about 10-20 seconds. Please wait.</p>
</div>
{% endblock %}
